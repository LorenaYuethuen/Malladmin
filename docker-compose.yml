version: '3.8'

services:
  # PostgreSQL - Main database for mall-admin backend
  postgres:
    image: postgres:15-alpine
    container_name: mall_postgres
    environment:
      POSTGRES_DB: mall_admin
      POSTGRES_USER: mall_user
      POSTGRES_PASSWORD: mall_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/migrations:/docker-entrypoint-initdb.d
    command: 
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mall_user -d mall_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis - Cache and session store
  redis:
    image: redis:7-alpine
    container_name: mall_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
